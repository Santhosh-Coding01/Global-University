<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Global University</title>
<link rel="stylesheet" href="style.css">

<style>
/* ⭐ Star Rating */
.stars {
    display: flex;
    justify-content: center;
    margin: 15px 0;
    font-size: 25px;
    cursor: pointer;
}

.stars span {
    color: #ccc;
    transition: 0.3s;
}

.stars span.active {
    color: gold;
}
</style>

</head>

<body>

<header>
    <h1>🎓 Global University</h1>
 <div class="menu-toggle">☰</div>

    <nav id="navMenu">
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Log-in</a>
        <a href="courses.html">Courses</a>
        <a href="faculty.html">Faculty</a>
        <a href="contact.html">Feedback</a>
        <button onclick="toggleTheme()">🌙</button>

    </nav>

</header>

<section class="contact">
    <h2>Student Feedback</h2>

    <form onsubmit="return submitFeedback()">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">

        <!-- ⭐ Rating -->
        <div class="stars" id="starRating">
            <span onclick="rate(1)">★</span>
            <span onclick="rate(2)">★</span>
            <span onclick="rate(3)">★</span>
            <span onclick="rate(4)">★</span>
            <span onclick="rate(5)">★</span>
        </div>

        <textarea id="message" placeholder="Your Feedback"></textarea>

        <button type="submit">Submit Feedback</button>
    </form>
</section>

<script>
// ⭐ Store rating
let rating = 0;

// ⭐ Set Rating
function rate(value) {
    rating = value;

    let stars = document.querySelectorAll("#starRating span");

    stars.forEach((star, index) => {
        if (index < value) {
            star.classList.add("active");
        } else {
            star.classList.remove("active");
        }
    });
}

// ✅ Submit Feedback
function submitFeedback() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if (name === "" || email === "" || rating === 0) {
        alert("❌ Please fill all fields and give rating");
        return false;
    }

    alert("✅ Feedback Submitted! Rating: " + rating + " ⭐");
    return true;
}
</script>

</body>
</html>
